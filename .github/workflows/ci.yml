name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: JDK ${{ matrix.jdk }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # JDK 17+ to *build* (Gradle 8.10+ requires it), but the produced
        # artifact still targets JDK 11 bytecode via kotlin.jvmToolchain(11)
        # — consumers running on JDK 11+ can use the published artifact.
        # See README "Requires" section for the runtime-vs-build distinction.
        jdk: ["17", "21"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}

      - uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Test
        run: ./gradlew test --no-daemon
